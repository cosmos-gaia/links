<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@cosmos.gaiaa | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* RESET & BASE TYPOGRAPHY */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d1117; /* Fallback gelap ala GitHub/Cosmic */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            position: relative; /* Diperlukan untuk pseudo-element vignette */
        }

        /* DYNAMIC VIDEO BACKGROUND LAYER */
        #background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: #000;
        }

        /* Object-fit memastikan video menutupi layar tanpa merusak rasio (Cropping dinamis) */
        #background-layer video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center; 
        }

        /* VIGNETTE EFFECT: Ilusi optik untuk memuluskan tepi batas video dan menaikkan kontras teks */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(15,15,15,0.1) 0%, rgba(15,15,15,0.85) 100%);
            z-index: -1;
            pointer-events: none; /* Klik diteruskan ke elemen UI */
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 680px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1; /* Memastikan UI berada di atas video dan vignette */
        }

        /* TOP ACTIONS */
        .top-actions {
            width: 100%;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .icon-btn:hover { opacity: 0.8; }

        /* PROFILE SECTION */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .username {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 16px;
        }

        .social-icons a {
            color: #fff;
            font-size: 24px;
            text-decoration: none;
            margin: 0 10px;
            transition: transform 0.2s;
        }
        .social-icons a:hover { transform: scale(1.1); }

        /* LIQUID GLASS BUTTONS */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .glass-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 18px 24px;
            border-radius: 35px;
            text-decoration: none;
            color: #ffffff;
            
            /* Komputasi Glassmorphism */
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 
                0 4px 24px -1px rgba(0, 0, 0, 0.15), 
                inset 0 1px 1px rgba(255, 255, 255, 0.2); 

            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .glass-btn:hover {
            transform: scale(1.015);
            background: rgba(255, 255, 255, 0.12);
        }

        .glass-btn:active {
            transform: scale(0.98);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-icon-left {
            width: 30px;
            font-size: 20px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            color: #ffffff; 
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.3px;
            padding: 0 10px;
        }

        .btn-icon-right {
            width: 30px;
            font-size: 16px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

   <div id="background-layer">
        <video loop muted playsinline preload="auto" poster="poster.jpg" id="bg-video"></video>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const video = document.getElementById("bg-video");
            
            const setVideoSource = () => {
                // Logika analitis penentuan rasio aspek
                const isMobile = window.innerWidth < 768;
                const targetSrc = isMobile ? "portrait.webm" : "landscape.webm";

                // Memastikan tidak terjadi pemuatan ulang (reload) yang redundan
                const currentSrc = video.src.split('/').pop(); 

                if (currentSrc !== targetSrc) {
                    video.src = targetSrc;
                    video.load(); 
                    
                    video.play().catch(error => {
                        console.warn("Intervensi OS mendeteksi Autoplay:", error);
                    });
                }
            };

            // Inisialisasi awal
            setVideoSource();

            // Mendengarkan perubahan orientasi layar secara real-time
            window.addEventListener("resize", setVideoSource);
        });
    </script>
    <div class="container">
        
        

        <div class="profile-header">
            <img src="https://i.ibb.co.com/JbkjYSg/pp.jpg" alt="Profile Picture" class="profile-pic">
            
            <h1 class="username">Gaia Projects</h1>
            <p class="bio">Just some of my project<br>and late-nights ideas.</p>
            
            <div class="social-icons">
                <a href="https://instagram.com/cosmos.gaiaa" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
            </div>
        </div>

        <div class="links-container">
            
            <a href="https://www.instructables.com/ESP8266-Prototype-MIDI-Controller-Via-USB-With-1-B/" target="_blank" rel="noopener noreferrer" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <div class="btn-text">ESP8266 MIDI Controller (Instructable)</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://cosmos-gaia.github.io/plasma-ion.github.io/" target="_blank" rel="noopener noreferrer" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-github"></i>
                </div>
                <div class="btn-text">Plasma-biotic Ion Theory</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://github.com/cosmos-gaia/esp8266-midicontrol-usb" target="_blank" rel="noopener noreferrer" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-github"></i>
                </div>
                <div class="btn-text">ESP8266 MIDI Controller</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

            <a href="https://soundcloud.com/gaia-instrument" target="_blank" rel="noopener noreferrer" class="glass-btn">
                <div class="btn-icon-left">
                    <i class="fa-brands fa-soundcloud"></i>
                </div>
                <div class="btn-text">Soundcloud</div>
                <div class="btn-icon-right"><i class="fa-solid fa-ellipsis-vertical"></i></div>
            </a>

        </div>

    </div>

</body>
</html>
